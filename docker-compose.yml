services:
  # 1. BASE DE DATOS (PostgreSQL)
  postgres_db:
    image: postgres:15-alpine
    container_name: gym_postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. ADMINISTRADOR DE BD (pgAdmin)
  pgadmin:
    image: dpage/pgadmin4
    container_name: elemental_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres_db:
        condition: service_healthy

  # 3. BACKEND (Express + Sequelize)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gym_backend
    restart: always
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DB_HOST=postgres_db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME}
      - EMAIL_PASS=${EMAIL_PASS}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_NOMBRE=${ADMIN_NOMBRE}
      - ADMIN_APELLIDO=${ADMIN_APELLIDO}
      - ADMIN_CEDULA=${ADMIN_CEDULA}
      - ADMIN_TELEFONO=${ADMIN_TELEFONO}
      - ADMIN_DIRECCION=${ADMIN_DIRECCION}
      - ADMIN_FECHA_NACIMIENTO=${ADMIN_FECHA_NACIMIENTO}
      - ADMIN_GENERO=${ADMIN_GENERO}
      - PORT=4000
    command: pnpm start
    depends_on:
      postgres_db:
        condition: service_healthy # Espera obligatoriamente a que la BD esté lista

  # 4. FRONTEND (React + Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
    container_name: elemental_frontend
    restart: always
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:4000/api}
    depends_on:
      - backend # Espera a que el backend esté arriba

volumes:
  postgres_data:
