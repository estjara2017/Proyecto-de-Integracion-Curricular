services:
  postgres_db:
    image: postgres:15-alpine
    container_name: gym_postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gym_backend
    restart: unless-stopped
    expose:
      - "4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: postgres_db
      DB_PORT: 5432
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ${DB_NAME:?DB_NAME is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
      EMAIL_USER: ${EMAIL_USER:?EMAIL_USER is required}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Elemental Cross Training}
      EMAIL_PASS: ${EMAIL_PASS:?EMAIL_PASS is required}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL is required}
      ADMIN_NOMBRE: ${ADMIN_NOMBRE:?ADMIN_NOMBRE is required}
      ADMIN_APELLIDO: ${ADMIN_APELLIDO:?ADMIN_APELLIDO is required}
      ADMIN_CEDULA: ${ADMIN_CEDULA:?ADMIN_CEDULA is required}
      ADMIN_TELEFONO: ${ADMIN_TELEFONO:?ADMIN_TELEFONO is required}
      ADMIN_DIRECCION: ${ADMIN_DIRECCION:?ADMIN_DIRECCION is required}
      ADMIN_FECHA_NACIMIENTO: ${ADMIN_FECHA_NACIMIENTO:?ADMIN_FECHA_NACIMIENTO is required}
      ADMIN_GENERO: ${ADMIN_GENERO:?ADMIN_GENERO is required}
      DB_MAX_RETRIES: ${DB_MAX_RETRIES:-30}
      DB_RETRY_DELAY_MS: ${DB_RETRY_DELAY_MS:-5000}
    command: pnpm start
    depends_on:
      - postgres_db
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:?VITE_API_URL is required}
    container_name: elemental_frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4
    container_name: elemental_pgadmin
    restart: unless-stopped
    profiles:
      - admin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:?PGADMIN_EMAIL is required}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:?PGADMIN_PASSWORD is required}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - postgres_db

volumes:
  postgres_data:
